category_name: "game"
display_name: "게임 산업 레이더"

sources:
  # Official Platform Sources
  - name: "Xbox Wire"
    type: "rss"
    url: "https://news.xbox.com/en-us/feed/"
  - name: "Nintendo Life"
    type: "rss"
    url: "https://www.nintendolife.com/feeds/latest"
  
  # Major Gaming News (Existing)
  - name: "IGN"
    type: "rss"
    url: "https://feeds.ign.com/ign/all"
  - name: "GameSpot"
    type: "rss"
    url: "https://www.gamespot.com/feeds/mashup/"
  - name: "Polygon"
    type: "rss"
    url: "https://www.polygon.com/rss/index.xml"
  - name: "Kotaku"
    type: "rss"
    url: "https://kotaku.com/rss"
  - name: "PC Gamer"
    type: "rss"
    url: "https://www.pcgamer.com/rss/"
  
  # Additional Quality Sources
  - name: "Eurogamer"
    type: "rss"
    url: "https://www.eurogamer.net/?format=rss"
  - name: "VentureBeat Games"
    type: "rss"
    url: "https://venturebeat.com/category/games/feed/"
  
  # Indie & Mobile Gaming
  - name: "IndieGames.com"
    type: "rss"
    url: "https://indiegamesplus.com/feed"
  - name: "Pocket Gamer"
    type: "rss"
    url: "https://www.pocketgamer.com/news/index.rss"
  - name: "Touch Arcade"
    type: "rss"
    url: "https://toucharcade.com/feed"
  
  # Esports
  - name: "Dot Esports"
    type: "rss"
    url: "https://dotesports.com/feed"
  - name: "Esports Insider"
    type: "rss"
    url: "https://esportsinsider.com/feed"

entities:
  - name: "Platform"
    display_name: "플랫폼"
    keywords:
      - "playstation"
      - "xbox"
      - "nintendo"
      - "steam"
      - "epic games"
      - "ps5"
      - "switch"
      - "pc gaming"
      - "game pass"
  - name: "Studio"
    display_name: "스튜디오"
    keywords:
      - "activision"
      - "ea games"
      - "ubisoft"
      - "rockstar"
      - "bethesda"
      - "nintendo"
      - "square enix"
      - "capcom"
      - "fromsoftware"
      - "valve"
      - "blizzard"
      - "cd projekt"
  - name: "Genre"
    display_name: "장르"
    keywords:
      - "rpg"
      - "fps"
      - "mmorpg"
      - "battle royale"
      - "indie"
      - "action"
      - "adventure"
      - "simulation"
      - "strategy"
      - "horror"
      - "open world"
  - name: "Release"
    display_name: "출시 정보"
    keywords:
      - "launch"
      - "release date"
      - "coming soon"
      - "early access"
      - "announced"
      - "trailer"
      - "dlc"
      - "expansion"
      - "update"
      - "patch"
