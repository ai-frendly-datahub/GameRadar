entities:
  - name: "Platform"
    display_name: "플랫폼"
    keywords:
      - "playstation"
      - "xbox"
      - "nintendo"
      - "steam"
      - "epic games"
      - "ps5"
      - "ps4"
      - "xbox series"
      - "xbox one"
      - "switch"
      - "pc gaming"
      - "game pass"
      - "playstation plus"
      - "gamepass"
  - name: "Studio"
    display_name: "스튜디오"
    keywords:
      - "activision"
      - "ea games"
      - "ubisoft"
      - "rockstar"
      - "bethesda"
      - "nintendo"
      - "square enix"
      - "capcom"
      - "fromsoftware"
      - "valve"
      - "blizzard"
      - "cd projekt"
      - "bandai namco"
      - "take-two"
      - "microsoft"
      - "sony"
  - name: "Genre"
    display_name: "장르"
    keywords:
      - "rpg"
      - "fps"
      - "mmorpg"
      - "battle royale"
      - "indie"
      - "action"
      - "adventure"
      - "simulation"
      - "strategy"
      - "horror"
      - "open world"
      - "puzzle"
      - "platformer"
      - "roguelike"
      - "souls-like"
  - name: "Release"
    display_name: "출시 정보"
    keywords:
      - "launch"
      - "release date"
      - "coming soon"
      - "early access"
      - "announced"
      - "trailer"
      - "dlc"
      - "expansion"
      - "update"
      - "patch"
      - "beta"
      - "preview"
  - name: "Gaming"
    display_name: "게임 관련"
    keywords:
      - "game"
      - "gaming"
      - "gamer"
      - "gameplay"
      - "esports"
      - "tournament"
      - "competitive"
